---
- name: Deploy Hobbit configuration
  hosts: minipcs
  become: yes

  tasks:
    - name: Install intel-gpu-tools and ddcutil
      apt:
        name:
          - intel-gpu-tools
          - ddcutil
        state: present
        update_cache: no
      tags: [infra]

    - name: Allow hobbit to run intel_gpu_top without password
      lineinfile:
        path: /etc/sudoers.d/hobbit-gaming
        line: 'hobbit ALL=(ALL) NOPASSWD: /usr/bin/intel_gpu_top'
        create: yes
        mode: '0440'
        validate: 'visudo -cf %s'
      tags: [infra]

    - name: Create hobbit directory
      file:
        path: "{{ hobbit_dir }}"
        state: directory
        owner: hobbit
        group: hobbit
      tags: [infra]

    - name: Create subdirectories
      file:
        path: "{{ hobbit_dir }}/{{ item }}"
        state: directory
        owner: hobbit
        group: hobbit
      loop:
        - bridge
        - webapp
        - mosquitto
        - zigbee2mqtt
        - space
        - ssl
      tags: [infra]

    - name: Generate local CA key
      command: >
        openssl genrsa -out {{ hobbit_dir }}/ssl/hobbit-ca.key 2048
      args:
        creates: "{{ hobbit_dir }}/ssl/hobbit-ca.key"
      tags: [docker]

    - name: Generate local CA certificate (10 year)
      command: >
        openssl req -x509 -new -nodes -key {{ hobbit_dir }}/ssl/hobbit-ca.key
        -sha256 -days 3650
        -out {{ hobbit_dir }}/ssl/hobbit-ca.crt
        -subj "/CN=Hobbit Home CA"
        -addext "basicConstraints=critical,CA:TRUE"
        -addext "keyUsage=critical,keyCertSign,cRLSign"
        -addext "subjectKeyIdentifier=hash"
      args:
        creates: "{{ hobbit_dir }}/ssl/hobbit-ca.crt"
      tags: [docker]

    - name: Generate server key
      command: >
        openssl genrsa -out {{ hobbit_dir }}/ssl/hobbit.key 2048
      args:
        creates: "{{ hobbit_dir }}/ssl/hobbit.key"
      tags: [docker]

    - name: Generate server CSR
      command: >
        openssl req -new -key {{ hobbit_dir }}/ssl/hobbit.key
        -out {{ hobbit_dir }}/ssl/hobbit.csr
        -subj "/CN=hobbit.house"
      args:
        creates: "{{ hobbit_dir }}/ssl/hobbit.csr"
      tags: [docker]

    - name: Create SAN extension file
      copy:
        content: |
          authorityKeyIdentifier=keyid,issuer
          basicConstraints=CA:FALSE
          keyUsage=critical,digitalSignature,keyEncipherment
          extendedKeyUsage=serverAuth
          subjectKeyIdentifier=hash
          subjectAltName=DNS:hobbit.house,DNS:hobbit,DNS:hobbit.local,IP:192.168.0.67
        dest: "{{ hobbit_dir }}/ssl/hobbit-ext.cnf"
      tags: [docker]

    - name: Sign server cert with local CA (825 days)
      command: >
        openssl x509 -req -in {{ hobbit_dir }}/ssl/hobbit.csr
        -CA {{ hobbit_dir }}/ssl/hobbit-ca.crt
        -CAkey {{ hobbit_dir }}/ssl/hobbit-ca.key
        -CAcreateserial
        -out {{ hobbit_dir }}/ssl/hobbit.crt
        -days 825 -sha256
        -extfile {{ hobbit_dir }}/ssl/hobbit-ext.cnf
      args:
        creates: "{{ hobbit_dir }}/ssl/hobbit.crt"
      notify: Restart docker services
      tags: [docker]

    - name: Template Docker Compose file
      template:
        src: ../files/docker-compose.yml
        dest: "{{ hobbit_dir }}/docker-compose.yml"
      notify: Restart docker services
      tags: [docker]

    - name: Template Nginx config
      template:
        src: ../files/nginx.conf
        dest: "{{ hobbit_dir }}/nginx.conf"
      notify: Restart docker services
      tags: [docker]

    - name: Provision Tailscale HTTPS cert
      command: tailscale cert --cert-file {{ hobbit_dir }}/ssl/tailscale.crt --key-file {{ hobbit_dir }}/ssl/tailscale.key {{ tailscale_fqdn }}
      when: tailscale_fqdn is defined
      register: tailscale_cert
      changed_when: tailscale_cert.rc == 0
      failed_when: false
      notify: Restart docker services
      tags: [docker]

    - name: Set up monthly Tailscale cert renewal
      cron:
        name: "Renew Tailscale HTTPS cert"
        job: "tailscale cert --cert-file {{ hobbit_dir }}/ssl/tailscale.crt --key-file {{ hobbit_dir }}/ssl/tailscale.key {{ tailscale_fqdn }} && docker restart hobbit-webserver-1"
        special_time: monthly
      when: tailscale_fqdn is defined
      tags: [docker]

    - name: Template go2rtc config
      template:
        src: ../files/go2rtc.yaml
        dest: "{{ hobbit_dir }}/go2rtc.yaml"
      notify: Restart docker services
      tags: [docker]

    - name: Copy Mosquitto config
      copy:
        src: ../files/mosquitto.conf
        dest: "{{ hobbit_dir }}/mosquitto/mosquitto.conf"
      notify: Restart docker services
      tags: [docker]

    - name: Copy Zigbee2MQTT config (initial only)
      template:
        src: ../files/zigbee2mqtt.yaml.j2
        dest: "{{ hobbit_dir }}/zigbee2mqtt/configuration.yaml"
        force: no
      notify: Restart docker services
      tags: [docker]

    - name: Backup Zigbee2MQTT state
      copy:
        src: "{{ hobbit_dir }}/zigbee2mqtt/{{ item }}"
        dest: "{{ hobbit_dir }}/zigbee2mqtt/{{ item }}.backup"
        remote_src: yes
        force: yes
      loop:
        - configuration.yaml
        - database.db
      failed_when: false
      tags: [docker]

    - name: Copy HDMI control script
      copy:
        src: ../files/hdmi-control.sh
        dest: /usr/local/bin/hdmi-control.sh
        mode: '0755'
      tags: [infra]

    # Kodi media center setup
    - name: Install Kodi and VA-API packages
      apt:
        name:
          - kodi
          - kodi-peripheral-joystick
          - intel-media-va-driver-non-free
          - vainfo
        state: present
      tags: [kodi]

    - name: Create Kodi userdata directory
      file:
        path: /home/hobbit/.kodi/userdata
        state: directory
        owner: hobbit
        group: hobbit
        mode: '0755'
      tags: [kodi]

    - name: Configure Kodi JSON-RPC web server
      template:
        src: ../roles/kodi/templates/advancedsettings.xml.j2
        dest: /home/hobbit/.kodi/userdata/advancedsettings.xml
        owner: hobbit
        group: hobbit
        mode: '0644'
      tags: [kodi]

    - name: Configure Kodi media sources
      template:
        src: ../roles/kodi/templates/sources.xml.j2
        dest: /home/hobbit/.kodi/userdata/sources.xml
        owner: hobbit
        group: hobbit
        mode: '0644'
      tags: [kodi]

    - name: Set Kodi audio output to PulseAudio
      replace:
        path: /home/hobbit/.kodi/userdata/guisettings.xml
        regexp: '<setting id="audiooutput.audiodevice">.*</setting>'
        replace: '<setting id="audiooutput.audiodevice">PULSE:Default</setting>'
      failed_when: false
      tags: [kodi, audio]

    # NAS (Samba file sharing)
    - name: Create media directory
      file:
        path: /media/hobbit
        state: directory
        owner: hobbit
        group: hobbit
        mode: '0755'
      tags: [nas]

    - name: Install Samba and udisks2
      apt:
        name:
          - samba
          - udisks2
        state: present
      tags: [nas]

    - name: Enable udisks2 service
      systemd:
        name: udisks2
        enabled: yes
        state: started
      tags: [nas]

    - name: Configure Samba
      template:
        src: ../roles/nas/templates/smb.conf.j2
        dest: /etc/samba/smb.conf
      notify: Restart samba
      tags: [nas]

    - name: Enable Samba services
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - smbd
        - nmbd
      tags: [nas]

    - name: Allow Samba through firewall
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        from_ip: "{{ lan_subnet }}"
      loop:
        - { port: '445', proto: 'tcp' }
        - { port: '137:138', proto: 'udp' }
      tags: [nas]

    # Audio: ensure PulseAudio stereo output via analog jack
    - name: Set ALSA model hint for ALC269VC analog output
      copy:
        content: |
          options snd-hda-intel model=generic
        dest: /etc/modprobe.d/snd-hda-intel.conf
        mode: '0644'
      register: alsa_model_hint
      tags: [audio]

    - name: Create PulseAudio config directory
      file:
        path: /home/hobbit/.config/pulse
        state: directory
        owner: hobbit
        group: hobbit
        mode: '0755'
      tags: [audio]

    - name: Configure PulseAudio for stereo output
      copy:
        content: |
          default-sample-channels = 2
          default-channel-map = front-left,front-right
        dest: /home/hobbit/.config/pulse/daemon.conf
        owner: hobbit
        group: hobbit
        mode: '0644'
      register: pulse_daemon_conf
      tags: [audio]

    - name: Configure PulseAudio to skip session module (prevent SSH restarts)
      copy:
        content: |
          .include /etc/pulse/default.pa
          # Disable module-systemd-login so SSH sessions don't restart PulseAudio
          unload-module module-systemd-login
        dest: /home/hobbit/.config/pulse/default.pa
        owner: hobbit
        group: hobbit
        mode: '0644'
      register: pulse_default_pa
      tags: [audio]

    - name: Restart PulseAudio if config changed
      become: yes
      become_user: hobbit
      shell: |
        export XDG_RUNTIME_DIR=/run/user/1000
        systemctl --user restart pulseaudio.service
      when: pulse_daemon_conf.changed or pulse_default_pa.changed
      changed_when: false
      tags: [audio]

    - name: Copy bridge.js
      copy:
        src: ../files/bridge.js
        dest: "{{ hobbit_dir }}/bridge/bridge.js"
      notify: Restart bridge
      tags: [bridge]

    - name: Copy bridge package.json
      copy:
        src: ../files/package.json
        dest: "{{ hobbit_dir }}/bridge/package.json"
      notify: Restart bridge
      tags: [bridge]

    - name: Install bridge dependencies
      npm:
        path: "{{ hobbit_dir }}/bridge"
        state: present
      become_user: hobbit
      tags: [bridge]

    - name: Create webapp directory
      file:
        path: "{{ hobbit_dir }}/webapp"
        state: directory
        owner: hobbit
        group: hobbit
      tags: [web]

    - name: Sync root workspace package.json
      copy:
        src: ../package.json
        dest: "{{ hobbit_dir }}/webapp/package.json"
        owner: hobbit
        group: hobbit
      tags: [web]

    - name: Sync packages to server
      synchronize:
        src: ../packages/
        dest: "{{ hobbit_dir }}/webapp/packages/"
        delete: yes
      become: no
      tags: [web]

    - name: Sync web source to server
      synchronize:
        src: ../web/
        dest: "{{ hobbit_dir }}/webapp/web/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=dist"
          - "--exclude=package-lock.json"
      become: no
      tags: [web]

    - name: Install webapp dependencies
      command: npm install
      args:
        chdir: "{{ hobbit_dir }}/webapp"
      become_user: hobbit
      register: npm_install
      changed_when: "'up to date' not in npm_install.stdout"
      tags: [web]

    - name: Build web UI on server
      command: npm run build
      args:
        chdir: "{{ hobbit_dir }}/webapp/web"
      become_user: hobbit
      notify: Reload nginx
      tags: [web]

    - name: Copy SilverBullet custom styles
      copy:
        src: ../files/silverbullet/STYLES.md
        dest: "{{ hobbit_dir }}/space/STYLES.md"
        owner: hobbit
        group: hobbit
      notify: Restart docker services
      tags: [docker]

    - name: Template bridge service file
      template:
        src: ../files/hobbit-bridge.service.j2
        dest: /etc/systemd/system/hobbit-bridge.service
      notify:
        - Reload systemd
        - Restart bridge
      tags: [bridge]

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart bridge
      systemd:
        name: hobbit-bridge
        state: restarted
        enabled: yes

    - name: Reload nginx
      shell: |
        cd {{ hobbit_dir }}
        docker compose exec -T webserver nginx -s reload

    - name: Restart samba
      systemd:
        name: smbd
        state: restarted

    - name: Restart docker services
      shell: |
        cd {{ hobbit_dir }}
        docker compose up -d --force-recreate

# Health checks after deployment
- name: Verify deployment
  hosts: minipcs
  become: no
  gather_facts: no

  tasks:
    - name: Wait for services to start
      pause:
        seconds: 10

    - name: Check bridge API health
      uri:
        url: http://localhost:3001/health
        return_content: yes
      register: bridge_health
      failed_when: false

    - name: Check Nginx is responding
      uri:
        url: http://localhost/
        return_content: no
        headers:
          Host: hobbit.local
      register: nginx_health
      failed_when: false

    - name: Check Docker containers running
      command: 'docker ps --format "{% raw %}{{.Names}}: {{.Status}}{% endraw %}"'
      register: docker_status
      changed_when: false

    - name: Display container status
      debug:
        var: docker_status.stdout_lines

    - name: Deployment health summary
      debug:
        msg: |
          === Deployment Health Check ===
          Bridge API: {{ 'OK' if bridge_health.status == 200 else 'FAILED (status: ' ~ bridge_health.status | default('N/A') ~ ')' }}
          Nginx:      {{ 'OK' if nginx_health.status == 200 else 'FAILED (status: ' ~ nginx_health.status | default('N/A') ~ ')' }}
          Containers: {{ docker_status.stdout_lines | length }} running
