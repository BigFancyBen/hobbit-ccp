---
- name: Deploy Hobbit configuration
  hosts: minipcs
  become: yes

  tasks:
    - name: Install intel-gpu-tools and ddcutil
      apt:
        name:
          - intel-gpu-tools
          - ddcutil
        state: present
        update_cache: no
      tags: [infra]

    - name: Allow hobbit to run intel_gpu_top without password
      lineinfile:
        path: /etc/sudoers.d/hobbit-gaming
        line: 'hobbit ALL=(ALL) NOPASSWD: /usr/bin/intel_gpu_top'
        create: yes
        mode: '0440'
        validate: 'visudo -cf %s'
      tags: [infra]

    # DISABLED — using Xbox Wireless Adapter (xone driver handles controllers)
    # - name: Install Bluetooth packages
    #   apt:
    #     name: bluez
    #     state: present
    #     update_cache: no

    - name: Add hobbit to input group
      user:
        name: hobbit
        groups: input
        append: yes
      tags: [infra]

    # DISABLED — using Xbox Wireless Adapter
    # - name: Allow hobbit to run bluetoothctl without password
    #   lineinfile:
    #     path: /etc/sudoers.d/hobbit-gaming
    #     line: 'hobbit ALL=(ALL) NOPASSWD: /usr/bin/bluetoothctl'
    #     create: yes
    #     mode: '0440'
    #     validate: 'visudo -cf %s'

    - name: Create hobbit directory
      file:
        path: "{{ hobbit_dir }}"
        state: directory
        owner: hobbit
        group: hobbit
      tags: [infra]

    - name: Create subdirectories
      file:
        path: "{{ hobbit_dir }}/{{ item }}"
        state: directory
        owner: hobbit
        group: hobbit
      loop:
        - bridge
        - web
        - mosquitto
        - zigbee2mqtt
        - space
        - ssl
      tags: [infra]

    - name: Generate self-signed SSL certificate
      command: >
        openssl req -x509 -nodes -days 3650 -newkey rsa:2048
        -keyout {{ hobbit_dir }}/ssl/hobbit.key
        -out {{ hobbit_dir }}/ssl/hobbit.crt
        -subj "/CN=hobbit.house"
        -addext "subjectAltName=DNS:hobbit.house,DNS:hobbit,DNS:hobbit.local,IP:192.168.0.67"
      args:
        creates: "{{ hobbit_dir }}/ssl/hobbit.crt"
      notify: Restart docker services
      tags: [docker]

    - name: Template Docker Compose file
      template:
        src: ../files/docker-compose.yml
        dest: "{{ hobbit_dir }}/docker-compose.yml"
      notify: Restart docker services
      tags: [docker]

    - name: Template Nginx config
      template:
        src: ../files/nginx.conf
        dest: "{{ hobbit_dir }}/nginx.conf"
      notify: Restart docker services
      tags: [docker]

    - name: Provision Tailscale HTTPS cert
      command: tailscale cert --cert-file {{ hobbit_dir }}/ssl/tailscale.crt --key-file {{ hobbit_dir }}/ssl/tailscale.key {{ tailscale_fqdn }}
      when: tailscale_fqdn is defined
      register: tailscale_cert
      changed_when: tailscale_cert.rc == 0
      failed_when: false
      notify: Restart docker services
      tags: [docker]

    - name: Set up monthly Tailscale cert renewal
      cron:
        name: "Renew Tailscale HTTPS cert"
        job: "tailscale cert --cert-file {{ hobbit_dir }}/ssl/tailscale.crt --key-file {{ hobbit_dir }}/ssl/tailscale.key {{ tailscale_fqdn }} && docker restart hobbit-webserver-1"
        special_time: monthly
      when: tailscale_fqdn is defined
      tags: [docker]

    - name: Copy Mosquitto config
      copy:
        src: ../files/mosquitto.conf
        dest: "{{ hobbit_dir }}/mosquitto/mosquitto.conf"
      notify: Restart docker services
      tags: [docker]

    - name: Copy Zigbee2MQTT config (initial only)
      template:
        src: ../files/zigbee2mqtt.yaml.j2
        dest: "{{ hobbit_dir }}/zigbee2mqtt/configuration.yaml"
        force: no
      notify: Restart docker services
      tags: [docker]

    - name: Backup Zigbee2MQTT state
      copy:
        src: "{{ hobbit_dir }}/zigbee2mqtt/{{ item }}"
        dest: "{{ hobbit_dir }}/zigbee2mqtt/{{ item }}.backup"
        remote_src: yes
        force: yes
      loop:
        - configuration.yaml
        - database.db
      failed_when: false
      tags: [docker]

    - name: Copy HDMI control script
      copy:
        src: ../files/hdmi-control.sh
        dest: /usr/local/bin/hdmi-control.sh
        mode: '0755'
      tags: [infra]

    - name: Copy xone pairing script
      copy:
        src: ../files/xone-pair.sh
        dest: /usr/local/bin/xone-pair.sh
        mode: '0755'
      tags: [infra]

    - name: Allow hobbit to run xone-pair without password
      lineinfile:
        path: /etc/sudoers.d/hobbit-gaming
        line: 'hobbit ALL=(ALL) NOPASSWD: /usr/local/bin/xone-pair.sh'
        create: yes
        mode: '0440'
        validate: 'visudo -cf %s'
      tags: [infra]

    - name: Copy bridge.js
      copy:
        src: ../files/bridge.js
        dest: "{{ hobbit_dir }}/bridge/bridge.js"
      notify: Restart bridge
      tags: [bridge]

    - name: Copy bridge package.json
      copy:
        src: ../files/package.json
        dest: "{{ hobbit_dir }}/bridge/package.json"
      notify: Restart bridge
      tags: [bridge]

    - name: Install bridge dependencies
      npm:
        path: "{{ hobbit_dir }}/bridge"
        state: present
      become_user: hobbit
      tags: [bridge]

    - name: Copy web dist
      copy:
        src: ../web/dist/
        dest: "{{ hobbit_dir }}/web/"
        owner: hobbit
        group: hobbit
      notify: Reload nginx
      tags: [web]

    - name: Copy SilverBullet custom styles
      copy:
        src: ../files/silverbullet/STYLES.md
        dest: "{{ hobbit_dir }}/space/STYLES.md"
        owner: hobbit
        group: hobbit
      notify: Restart docker services
      tags: [docker]

    - name: Copy bridge service file
      copy:
        src: ../files/hobbit-bridge.service
        dest: /etc/systemd/system/hobbit-bridge.service
      notify:
        - Reload systemd
        - Restart bridge
      tags: [bridge]

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart bridge
      systemd:
        name: hobbit-bridge
        state: restarted
        enabled: yes

    - name: Reload nginx
      shell: |
        cd {{ hobbit_dir }}
        docker compose exec -T webserver nginx -s reload

    - name: Restart docker services
      shell: |
        cd {{ hobbit_dir }}
        docker compose up -d --force-recreate

# Health checks after deployment
- name: Verify deployment
  hosts: minipcs
  become: no
  gather_facts: no

  tasks:
    - name: Wait for services to start
      pause:
        seconds: 10

    - name: Check bridge API health
      uri:
        url: http://localhost:3001/health
        return_content: yes
      register: bridge_health
      failed_when: false

    - name: Check Nginx is responding
      uri:
        url: http://localhost/
        return_content: no
        headers:
          Host: hobbit.local
      register: nginx_health
      failed_when: false

    - name: Check Docker containers running
      command: 'docker ps --format "{% raw %}{{.Names}}: {{.Status}}{% endraw %}"'
      register: docker_status
      changed_when: false

    - name: Display container status
      debug:
        var: docker_status.stdout_lines

    - name: Deployment health summary
      debug:
        msg: |
          === Deployment Health Check ===
          Bridge API: {{ 'OK' if bridge_health.status == 200 else 'FAILED (status: ' ~ bridge_health.status | default('N/A') ~ ')' }}
          Nginx:      {{ 'OK' if nginx_health.status == 200 else 'FAILED (status: ' ~ nginx_health.status | default('N/A') ~ ')' }}
          Containers: {{ docker_status.stdout_lines | length }} running
