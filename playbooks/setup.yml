---
- name: Set up Hobbit Mini PC
  hosts: minipcs
  become: yes

  roles:
    - base        # mDNS, firewall, Docker, Node.js
    - security    # SSH hardening, unattended-upgrades
    - tailscale   # WireGuard mesh VPN for remote access
    - dns         # Local DNS server (dnsmasq)
    - moonlight   # X11, Moonlight, pairing prep
    - xone        # Xbox wireless dongle driver
    - kodi        # Kodi media center with GBM + VA-API
    - nas         # USB automount (udisks2) + Samba sharing
    - zigbee      # Mosquitto, Zigbee2MQTT
    - webserver   # Nginx, React app, bridge service
