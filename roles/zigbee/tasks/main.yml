---
- name: Create Zigbee directories
  file:
    path: "{{ hobbit_dir }}/{{ item }}"
    state: directory
    owner: hobbit
    group: hobbit
  loop:
    - zigbee2mqtt
    - mosquitto

- name: Add hobbit user to dialout group for USB access
  user:
    name: hobbit
    groups: dialout
    append: yes

- name: Create udev rule for Zigbee dongle
  copy:
    content: |
      SUBSYSTEM=="tty", ATTRS{idVendor}=="1a86", ATTRS{idProduct}=="7523", SYMLINK+="zigbee", MODE="0666"
    dest: /etc/udev/rules.d/99-zigbee.rules
  notify: Reload udev
