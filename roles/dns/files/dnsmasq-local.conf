# Hobbit local DNS configuration

# Don't read /etc/resolv.conf (we'll set upstream servers explicitly)
no-resolv

# Upstream DNS servers (Cloudflare + Google)
server=1.1.1.1
server=8.8.8.8

# Local domain
local=/house/
domain=house

# Local hostnames - hobbit resolves to itself
address=/hobbit.house/192.168.0.67
address=/hobbit.local/192.168.0.67
address=/hobbit/192.168.0.67

# Cache size
cache-size=1000

# Don't forward short names
domain-needed

# Never forward addresses in non-routed address spaces
bogus-priv

# Note: stop-dns-rebind was removed as it can break legitimate services
# that resolve to private IPs (e.g., split-horizon DNS, some CDNs)
