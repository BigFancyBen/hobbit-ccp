---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - avahi-daemon
      - ca-certificates
      - curl
      - ufw
      - python3-pip
    state: present

- name: Enable mDNS
  systemd:
    name: avahi-daemon
    enabled: yes
    state: started

- name: Set UFW default deny incoming
  ufw:
    direction: incoming
    default: deny

- name: Set UFW default allow outgoing
  ufw:
    direction: outgoing
    default: allow

- name: Configure firewall - LAN only
  ufw:
    rule: allow
    port: "{{ item }}"
    from_ip: "{{ lan_subnet }}"
  loop:
    - "22"    # SSH
    - "53"    # DNS (dnsmasq)
    - "80"    # HTTP
    - "443"   # HTTPS
    - "853"   # DNS-over-TLS (Android uses this)
    - "3001"  # Bridge API
    - "5353"  # mDNS
    - "1883"  # MQTT

- name: Allow Docker network to host
  ufw:
    rule: allow
    from_ip: 172.16.0.0/12

- name: Enable firewall
  ufw:
    state: enabled

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repo
  apt_repository:
    repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Add user to docker group
  user:
    name: hobbit
    groups: docker
    append: yes

- name: Install Node.js
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node

# Passwordless sudo for Ansible deployments
- name: Allow hobbit passwordless sudo
  copy:
    content: |
      hobbit ALL=(ALL) NOPASSWD: ALL
    dest: /etc/sudoers.d/hobbit-ansible
    mode: '0440'
    validate: 'visudo -cf %s'

# Backup automation
- name: Copy backup script
  copy:
    src: backup.sh
    dest: /usr/local/bin/backup.sh
    mode: '0755'

- name: Copy backup service
  copy:
    src: hobbit-backup.service
    dest: /etc/systemd/system/hobbit-backup.service

- name: Copy backup timer
  copy:
    src: hobbit-backup.timer
    dest: /etc/systemd/system/hobbit-backup.timer

- name: Enable backup timer
  systemd:
    name: hobbit-backup.timer
    enabled: yes
    state: started
    daemon_reload: yes
