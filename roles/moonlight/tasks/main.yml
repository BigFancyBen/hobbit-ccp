---
- name: Install X11 and AppImage dependencies
  apt:
    name:
      - xserver-xorg
      - x11-xserver-utils
      - xinit
      - libfuse2t64
      - openbox
      - ddcutil
      - xvfb
      - xdotool
      - alsa-utils
      - pulseaudio
    state: present

- name: Add hobbit to audio and pulse-access groups
  user:
    name: hobbit
    groups: audio,pulse-access
    append: yes

- name: Enable lingering for hobbit (keep user session alive)
  command: loginctl enable-linger hobbit
  changed_when: false

- name: Ensure PulseAudio runs as hobbit user service
  become: yes
  become_user: hobbit
  shell: |
    export XDG_RUNTIME_DIR=/run/user/1000
    systemctl --user enable pulseaudio.socket pulseaudio.service
  changed_when: false

- name: Pin ALSA mixers at 100% (passthrough for PulseAudio)
  shell: amixer set Master unmute 100% && amixer set Headphone unmute 100%
  changed_when: false

- name: Create ALSA passthrough systemd service
  copy:
    content: |
      [Unit]
      Description=Pin ALSA mixers at 100%% for PulseAudio passthrough
      After=sound.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/amixer set Master unmute 100%%
      ExecStartPost=/usr/bin/amixer set Headphone unmute 100%%
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/alsa-passthrough.service
  notify: Reload systemd

- name: Enable ALSA passthrough service
  systemd:
    name: alsa-passthrough
    enabled: yes
    state: started

- name: Set ALSA model hint for ALC269VC analog output
  copy:
    content: |
      options snd-hda-intel model=generic
    dest: /etc/modprobe.d/snd-hda-intel.conf
    mode: '0644'
  register: alsa_model_hint

- name: Create PulseAudio config directory
  file:
    path: /home/hobbit/.config/pulse
    state: directory
    owner: hobbit
    group: hobbit
    mode: '0755'

- name: Configure PulseAudio for stereo output
  copy:
    content: |
      default-sample-channels = 2
      default-channel-map = front-left,front-right
    dest: /home/hobbit/.config/pulse/daemon.conf
    owner: hobbit
    group: hobbit
    mode: '0644'
  register: pulse_daemon_conf

- name: Configure PulseAudio to skip session module (prevent SSH restarts)
  copy:
    content: |
      .include /etc/pulse/default.pa
      # Disable module-systemd-login so SSH sessions don't restart PulseAudio
      unload-module module-systemd-login
    dest: /home/hobbit/.config/pulse/default.pa
    owner: hobbit
    group: hobbit
    mode: '0644'
  register: pulse_default_pa

- name: Restart PulseAudio if config changed
  become: yes
  become_user: hobbit
  shell: |
    export XDG_RUNTIME_DIR=/run/user/1000
    systemctl --user restart pulseaudio.service
  when: pulse_daemon_conf.changed or pulse_default_pa.changed
  changed_when: false

- name: Remove bad .asoundrc if present
  file:
    path: /home/hobbit/.asoundrc
    state: absent

- name: Copy minimal openbox config (no keybindings)
  copy:
    src: ../../files/openbox-rc.xml
    dest: /home/hobbit/openbox-rc.xml
    owner: hobbit
    group: hobbit
    mode: '0644'

- name: Download Moonlight AppImage
  get_url:
    url: https://github.com/moonlight-stream/moonlight-qt/releases/download/v6.1.0/Moonlight-6.1.0-x86_64.AppImage
    dest: /home/hobbit/moonlight.AppImage
    owner: hobbit
    group: hobbit
    mode: '0755'

- name: Create moonlight symlink
  file:
    src: /home/hobbit/moonlight.AppImage
    dest: /usr/local/bin/moonlight
    state: link

- name: Migrate Flatpak pairing to native (if exists)
  shell: |
    SRC="/home/hobbit/.var/app/com.moonlight_stream.Moonlight/config/Moonlight Game Streaming Project"
    DEST="/home/hobbit/.config/Moonlight Game Streaming Project"
    if [ -d "$SRC" ] && [ ! -d "$DEST" ]; then
      mkdir -p "$DEST"
      cp -r "$SRC"/* "$DEST"/
      chown -R hobbit:hobbit "$DEST"
    fi
  changed_when: false

- name: Allow hobbit user to start X
  lineinfile:
    path: /etc/X11/Xwrapper.config
    regexp: '^allowed_users='
    line: 'allowed_users=anybody'
    create: yes

- name: Create .xinitrc for hobbit user
  copy:
    content: |
      # Disable screen blanking
      xset s off
      xset -dpms
      xset s noblank
    dest: /home/hobbit/.xinitrc
    owner: hobbit
    group: hobbit
    mode: '0644'

- name: Disable getty on tty1 to keep screen off when idle
  systemd:
    name: getty@tty1
    enabled: no
    masked: yes
    state: stopped

- name: Copy HDMI off service
  copy:
    src: ../../files/hdmi-off.service
    dest: /etc/systemd/system/hdmi-off.service
  notify: Reload systemd

- name: Enable HDMI off service
  systemd:
    name: hdmi-off
    enabled: yes
    state: started

- name: Display pairing instructions
  debug:
    msg: |
      Moonlight installed! To pair with your gaming PC:
      1. SSH into this machine
      2. Run: sudo xinit moonlight -- :0 vt7
      3. Add your gaming PC's IP in Moonlight
      4. Enter the PIN shown on your gaming PC
      5. Exit Moonlight (Ctrl+Q)
