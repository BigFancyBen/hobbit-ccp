# Reject requests with unknown Host headers (DNS rebinding protection)
server {
    listen 80 default_server;
    return 444;  # Close connection without response
}

server {
    listen 80;
    server_name hobbit hobbit.local hobbit.house;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable server version disclosure
    server_tokens off;

    # React SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Proxy to Host Bridge for Moonlight/Monitor control
    location /api/control/ {
        proxy_pass http://host.docker.internal:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy to Zigbee2MQTT frontend (if enabled)
    location /zigbee/ {
        proxy_pass http://zigbee2mqtt:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
