# Shared config for all mini PCs
gaming_pc_host: "192.168.0.69"   # Sunshine server
timezone: "America/New_York"
zigbee_device: "/dev/ttyUSB0"

# Docker paths
hobbit_dir: "/home/hobbit/hobbit"

# Network security
lan_subnet: "192.168.0.0/24"

# SilverBullet — sb_user is in vault.yml (encrypted)

# Tailscale — tailscale_fqdn is in vault.yml (encrypted)
# Set after `tailscale up` — run `tailscale status` to find your FQDN

# Wi-Fi — wifi_password is in vault.yml (encrypted)
wifi_ssid: "56k Dial-up"

# NAS — Samba interface binding
lan_interface: "wlp2s0"

# Lorex camera — camera_password is in vault.yml (encrypted)
